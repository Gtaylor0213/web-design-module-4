name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build backend (linux/amd64, static)
        working-directory: backend
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o rolebook-server .

      - name: Set up SSH
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LIGHTSAIL_SSH_KEY" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Deploy frontend
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/lightsail.pem" \
            frontend/ \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}:/var/www/rolebook/frontend/"

      - name: Deploy backend binary
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/lightsail.pem" \
            backend/rolebook-server \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}:/var/www/rolebook/backend/rolebook-server"

      - name: Restart rolebook-backend service
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          ssh -i ~/.ssh/lightsail.pem \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            "sudo systemctl restart rolebook-backend"
