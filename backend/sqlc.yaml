version: "2"
sql:
  - engine: "mysql"
    schema: "schema.sql"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "db/generated"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
